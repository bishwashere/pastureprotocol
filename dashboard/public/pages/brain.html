<div id="page-brain" class="page">
  <div class="brain-shell">
    <div class="brain-toolbar card">
      <div class="brain-title-block">
        <h2 class="brain-title">Brain</h2>
        <div class="brain-meta-row">
          <p class="skill-meta" id="brain-meta">Memory and history cloud</p>
          <div id="brain-import-progress" class="brain-import-progress" role="progressbar" aria-label="Brain import progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" hidden>
            <div class="brain-import-progress-track">
              <div id="brain-import-progress-bar" class="brain-import-progress-bar"></div>
            </div>
            <span id="brain-import-progress-label" class="brain-import-progress-label">0%</span>
          </div>
        </div>
      </div>
      <div class="brain-controls">
        <div class="brain-settings">
          <button id="brain-settings-toggle" type="button">Settings</button>
          <div id="brain-settings-panel" class="brain-settings-panel" hidden>
            <label>
              <span>Direct links</span>
              <input id="brain-setting-direct" type="number" min="1" max="40" step="1">
            </label>
            <label>
              <span>Next links</span>
              <input id="brain-setting-second" type="number" min="0" max="80" step="1">
            </label>
            <label>
              <span>Visible words</span>
              <input id="brain-setting-words" type="number" min="0" max="2600" step="10">
            </label>
            <label>
              <span>Min links</span>
              <input id="brain-setting-min-links" type="number" min="1" max="20" step="1">
            </label>
            <label>
              <span>Min font</span>
              <input id="brain-setting-min-font" type="number" min="6" max="30" step="1">
            </label>
            <label>
              <span>Max font</span>
              <input id="brain-setting-max-font" type="number" min="12" max="80" step="1">
            </label>
            <button id="brain-import-submit" class="brain-import-button" type="button">Import</button>
            <input id="brain-import-file" type="file" accept=".zip,.json,.txt,.md,.csv,.html,application/zip,application/x-zip-compressed,text/plain,application/json" multiple hidden>
            <button id="brain-settings-apply" type="button">Apply</button>
            <button id="brain-settings-reset" type="button">Reset</button>
          </div>
        </div>
        <button id="brain-refresh" type="button">Generate</button>
        <button id="brain-fullscreen-toggle" type="button" aria-pressed="false">Fullscreen</button>
      </div>
    </div>

    <div class="brain-stage card">
      <button id="brain-fullscreen-exit" class="brain-fullscreen-exit" type="button" hidden>Exit fullscreen</button>
      <div id="brain-cloud" class="brain-cloud" aria-live="polite"></div>
      <div id="brain-focus" class="brain-focus" hidden></div>
    </div>
  </div>
</div>
