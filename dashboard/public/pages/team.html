<div id="page-team" class="page">
    <div class="card mc-shell">
      <!-- Sidebar -->
      <nav class="mc-sidebar" aria-label="Mission Control navigation">
        <div class="mc-sidebar-logo" aria-hidden="true">♞</div>
        <div class="mc-sidebar-nav">
          <button type="button" class="mc-nav-item active" data-mc-nav="mission" aria-label="Home">
            <span class="mc-nav-icon">⌂</span><span class="mc-nav-label">Home</span>
          </button>
          <button type="button" class="mc-nav-item" data-mc-nav="tasks" aria-label="Tasks">
            <span class="mc-nav-icon">☑</span><span class="mc-nav-label">Tasks</span>
          </button>
          <button type="button" class="mc-nav-item" data-mc-nav="agents" aria-label="Agents">
            <span class="mc-nav-icon">♙</span><span class="mc-nav-label">Agents</span>
          </button>
          <button type="button" class="mc-nav-item" data-mc-nav="projects" aria-label="Projects">
            <span class="mc-nav-icon">◫</span><span class="mc-nav-label">Projects</span>
          </button>
          <button type="button" class="mc-nav-item" data-mc-nav="activity" aria-label="Activity">
            <span class="mc-nav-icon">⌁</span><span class="mc-nav-label">Activity</span>
          </button>
          <button type="button" class="mc-nav-item" data-mc-nav="missions" aria-label="Missions">
            <span class="mc-nav-icon">◎</span><span class="mc-nav-label">Missions</span>
            <span class="mc-nav-badge" id="mc2-approvals-badge" hidden aria-label="Pending approvals">0</span>
          </button>
          <div class="mc-sidebar-projects-wrap">
            <div class="mc-sidebar-projects-label">Projects</div>
            <div id="mc2-sidebar-projects" class="mc-sidebar-projects" aria-label="Project shortcuts">
              <span class="mc-sidebar-projects-empty">Loading…</span>
            </div>
          </div>
        </div>
        <div class="mc-sidebar-footer">
          <strong id="mc2-actions-rate">—</strong>
          actions/min
        </div>
      </nav>

      <!-- Main content -->
      <div class="mc-main">
        <!-- Header -->
        <header class="mc-header">
          <h1 class="mc-header-title">Pasture Protocol</h1>
          <span class="mc-header-pulse" aria-hidden="true">〜</span>
          <div class="mc-mission-select-wrap" style="display:flex;align-items:center;gap:0.35rem;">
            <select id="mc2-mission-select" class="mc-mission-select" aria-label="Active mission">
              <option value="">No active mission</option>
            </select>
            <div style="position:relative;">
              <button type="button" id="mc2-mission-menu-btn" class="secondary" style="margin:0;padding:0.2rem 0.55rem;font-size:1.1rem;line-height:1.2;letter-spacing:0.04em;font-weight:700;" title="Mission options" aria-haspopup="true" aria-expanded="false">⋯</button>
              <div id="mc2-mission-menu-dropdown" style="display:none;position:absolute;top:calc(100% + 5px);right:0;z-index:300;background:#1a2535;border:1px solid rgba(255,255,255,0.1);border-radius:0.45rem;min-width:178px;box-shadow:0 6px 22px rgba(0,0,0,0.45);overflow:hidden;">
                <button type="button" id="mc2-mission-history-btn" class="mc2-mission-menu-item" style="display:block;width:100%;text-align:left;padding:0.6rem 0.9rem;background:none;border:none;color:inherit;cursor:pointer;font-size:0.83rem;white-space:nowrap;">View history…</button>
                <div style="height:1px;background:rgba(255,255,255,0.08);margin:0 0.6rem;"></div>
                <button type="button" id="mc2-mission-assign-btn" class="mc2-mission-menu-item" style="display:block;width:100%;text-align:left;padding:0.6rem 0.9rem;background:none;border:none;color:inherit;cursor:pointer;font-size:0.83rem;white-space:nowrap;">Assign to agent…</button>
                <div style="height:1px;background:rgba(255,255,255,0.08);margin:0 0.6rem;"></div>
                <button type="button" id="mc2-mission-delete-btn" class="mc2-mission-menu-item" style="display:block;width:100%;text-align:left;padding:0.6rem 0.9rem;background:none;border:none;color:var(--color-danger,#d63031);cursor:pointer;font-size:0.83rem;white-space:nowrap;">Delete mission…</button>
              </div>
            </div>
          </div>

          <!-- Mission delete confirmation modal -->
          <div id="mc2-mission-delete-modal" role="dialog" aria-modal="true" aria-labelledby="mc2-mission-delete-title" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.55);align-items:center;justify-content:center;">
            <div style="background:#fff;color:#1a1a1a;border-radius:0.75rem;padding:1.5rem 1.75rem;max-width:480px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.22);">
              <h4 id="mc2-mission-delete-title" style="margin:0 0 0.75rem;color:#1a1a1a;">Delete mission?</h4>
              <p id="mc2-mission-delete-desc" style="margin:0 0 1rem;font-size:0.9rem;line-height:1.5;color:#1a1a1a;"></p>
              <ul id="mc2-mission-delete-items" style="margin:0 0 1.25rem;padding-left:1.25rem;font-size:0.85rem;line-height:1.6;color:#1a1a1a;"></ul>
              <div style="display:flex;gap:0.5rem;justify-content:flex-end;">
                <button type="button" id="mc2-mission-delete-cancel" class="secondary" style="margin:0;color:#1a1a1a;background:#f0f0f0;border:1px solid #ccc;">Cancel</button>
                <button type="button" id="mc2-mission-delete-confirm" style="margin:0;background:var(--color-danger,#d63031);color:#fff;border:none;border-radius:0.4rem;padding:0.4rem 1rem;cursor:pointer;">Delete permanently</button>
              </div>
            </div>
          </div>

          <!-- Mission assign-to-agent modal -->
          <div id="mc2-mission-assign-modal" role="dialog" aria-modal="true" aria-labelledby="mc2-mission-assign-title" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.55);align-items:center;justify-content:center;">
            <div style="background:#fff;color:#1a1a1a;border-radius:0.75rem;padding:1.5rem 1.75rem;max-width:420px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.22);">
              <h4 id="mc2-mission-assign-title" style="margin:0 0 0.35rem;color:#1a1a1a;">Assign mission to agent</h4>
              <p id="mc2-mission-assign-desc" style="margin:0 0 1rem;font-size:0.88rem;color:#444;line-height:1.4;"></p>
              <label for="mc2-mission-assign-select" style="display:block;font-size:0.82rem;font-weight:600;color:#1a1a1a;margin-bottom:0.35rem;">Agent</label>
              <select id="mc2-mission-assign-select" style="width:100%;padding:0.45rem 0.6rem;border:1px solid #ccc;border-radius:0.4rem;font-size:0.88rem;color:#1a1a1a;background:#fafafa;margin-bottom:1.1rem;"></select>
              <div id="mc2-mission-assign-error" style="display:none;color:var(--color-danger,#d63031);font-size:0.82rem;margin-bottom:0.7rem;"></div>
              <div style="display:flex;gap:0.5rem;justify-content:flex-end;">
                <button type="button" id="mc2-mission-assign-cancel" class="secondary" style="margin:0;color:#1a1a1a;background:#f0f0f0;border:1px solid #ccc;">Cancel</button>
                <button type="button" id="mc2-mission-assign-confirm" style="margin:0;background:#2d6cf6;color:#fff;border:none;border-radius:0.4rem;padding:0.4rem 1rem;cursor:pointer;">Assign</button>
              </div>
            </div>
          </div>
          <!-- Mission history modal -->
          <div id="mc2-mission-history-modal" class="mc2-history-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="mc2-history-modal-title" style="display:none;">
            <div class="mc2-history-modal-card">
              <div class="mc2-history-modal-header">
                <h4 id="mc2-history-modal-title" class="mc2-history-modal-title">Mission history</h4>
                <button type="button" id="mc2-history-modal-close" class="mc2-history-modal-close" aria-label="Close history">×</button>
              </div>
              <div class="mc2-history-tabs" role="tablist">
                <button type="button" class="mc2-history-tab active" data-history-tab="ticks" role="tab" aria-selected="true">Tick log</button>
                <button type="button" class="mc2-history-tab" data-history-tab="memory" role="tab" aria-selected="false">Memory</button>
              </div>
              <div id="mc2-history-body" class="mc2-history-body">
                <div class="mc2-history-loading">Loading…</div>
              </div>
            </div>
          </div>

          <div class="mc-header-actions">
            <span class="mc-llm-usage-chip" id="mc2-llm-usage" title="Cloud LLM calls today / daily limit">
              <span class="mc-llm-usage-icon" aria-hidden="true">◈</span>
              <span id="mc2-llm-usage-text">0 / 100</span>
            </span>
            <button type="button" class="mc-llm-local-rpm-chip" id="mc2-local-rpm-btn" title="Local LLM rate limit: requests per minute (click to change)">
              <span class="mc-llm-usage-icon" aria-hidden="true">⬡</span>
              <span id="mc2-local-rpm-text">1 req/min</span>
            </button>
            <span class="mc-live-badge" id="mc2-live-badge">
              <span class="mc-live-dot"></span>Live <span class="mc-mini-pulse" aria-hidden="true">⌁</span>
            </span>
            <button type="button" class="mc-icon-btn" aria-label="Notifications">♢</button>
            <span class="mc-profile-dot" aria-hidden="true">BM</span>
            <button type="button" id="mc2-add-agent-btn" class="chat-toolbar-btn" style="margin:0;" title="Create a new agent">+ Agent</button>
          </div>
        </header>

        <div id="mc2-pending-approvals" class="mc-pending-approvals" hidden aria-live="polite"></div>

        <!-- MC2 page views (loaded from pages/mc2/*.html) -->
        <div id="mc2-views-root">
<!-- MC2_VIEWS -->
        </div>
      </div>
    </div>

    <!-- Task detail popup (opens from kanban, tasks list, movement, etc.) -->
    <div id="mc2-task-drawer" class="mc-task-popup" aria-hidden="true">
      <div class="mc-task-popup-backdrop" data-mc-task-drawer-close tabindex="-1"></div>
      <section class="mc-task-popup-card" role="dialog" aria-modal="true" aria-labelledby="mc2-task-drawer-title">
        <div class="mc-task-popup-header">
          <p class="mc-task-popup-kicker">Task</p>
          <button type="button" class="mc-task-popup-close" data-mc-task-drawer-close aria-label="Close task detail">×</button>
        </div>
        <div id="mc2-task-drawer-body" class="mc-task-popup-body"></div>
      </section>
    </div>
  </div>
