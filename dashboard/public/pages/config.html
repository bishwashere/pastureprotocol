<div id="page-config" class="page">
    <div class="card">
      <h2 style="margin:0 0 0.75rem 0; font-size:1rem;">Config</h2>
      <p class="skill-meta" style="margin:0 0 0.75rem 0;">Edit the full config below and save to write config.json. Invalid JSON will show an error on save.</p>
      <textarea id="full-config" class="config-json-editable" spellcheck="false"></textarea>
      <div style="margin-top:0.75rem; display:flex; align-items:center; gap:0.5rem;">
        <button type="button" id="config-save">Save</button>
        <span id="config-saved" style="color: var(--green); font-size:0.85rem; display:none;">Saved.</span>
        <span id="config-error" class="error" style="display:none;"></span>
      </div>
    </div>
  </div>
