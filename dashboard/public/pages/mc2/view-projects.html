<!-- MC2 view: Projects -->
<div id="mc2-view-projects" class="mc-view" hidden>
  <div id="mc2-proj-workspace">
    <div class="mc-activity-toolbar">
      <p class="mc-section-title">PROJECTS</p>
    </div>
    <section id="mc2-proj-connectors" class="mc2-proj-connectors" aria-label="Connectors">
      <div class="mc2-proj-connectors-head">
        <p class="mc-section-title">CONNECTOR</p>
        <p id="mc2-proj-connectors-hint" class="mc2-proj-connectors-hint skill-meta">Connect GitHub, MongoDB, and other services for the selected project.</p>
      </div>
      <div id="mc2-proj-connectors-grid" class="mc2-proj-connectors-grid"></div>
    </section>
    <div class="proj-toolbar mc2-proj-toolbar">
      <input id="mc2-proj-new-name" type="text" placeholder="Project name…" />
      <input id="mc2-proj-new-url" type="url" placeholder="URL (optional)…" />
      <input id="mc2-proj-new-desc" type="text" placeholder="Description (optional)…" />
      <input id="mc2-proj-new-team" type="text" placeholder="Team (optional)" />
      <button type="button" id="mc2-proj-add-btn">+ Add Project</button>
    </div>
    <div id="mc2-proj-canvas" class="proj-canvas mc2-proj-canvas">
      <div class="proj-empty">No projects yet. Add one above.</div>
    </div>
  </div>
</div>
