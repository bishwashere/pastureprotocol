<!-- MC2 view: Activity / Inbox / Outbox -->
<div id="mc2-view-activity" class="mc-view" hidden>
  <div class="mc-activity-toolbar">
    <p class="mc-section-title" id="mc2-activity-title">LIVE ACTIVITY</p>
    <label class="mc-agent-filter" for="mc2-inbox-agent-filter">
      <span>Agent</span>
      <select id="mc2-inbox-agent-filter" class="mc2-agent-filter-select" aria-label="Filter inbox by agent">
        <option value="">All agents</option>
      </select>
    </label>
  </div>
  <div class="team-agent-panel-ranges mc2-range-controls" aria-label="Inbox and activity timeline">
    <button type="button" class="team-agent-panel-range active" data-range="today" aria-pressed="true">Today</button>
    <button type="button" class="team-agent-panel-range" data-range="yesterday" aria-pressed="false">Yesterday</button>
    <button type="button" class="team-agent-panel-range" data-range="last7" aria-pressed="false">Last week</button>
    <button type="button" class="team-agent-panel-range" data-range="last30" aria-pressed="false">Last 30 days</button>
  </div>
  <div id="mc2-activity-feed" style="display:flex;flex-direction:column;gap:0.2rem;">
    <p style="color:var(--muted);font-size:0.66rem;">No activity yet.</p>
  </div>
</div>
