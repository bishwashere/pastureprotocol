<!-- MC2 view: Initiatives -->
<div id="mc2-view-initiatives" class="mc-view" hidden>
  <div class="team-goals-head" style="margin-bottom:0.35rem;">
    <p class="mc-section-title" style="margin:0;">INITIATIVES</p>
    <button type="button" id="mc2-initiatives-refresh" class="secondary" style="margin:0;">Refresh</button>
  </div>
  <p class="mc2-initiatives-hint" style="color:var(--muted);font-size:0.66rem;margin:0 0 0.5rem;">
    Review agent proposals — approve to add to a mission, reject, or spin up a new mission. Nothing becomes a task until you approve.
  </p>
  <div class="team-initiatives-main mc2-initiatives-main">
    <div id="mc2-initiatives-list" class="team-initiatives-list">
      <p class="team-agent-inbox-empty" style="margin:0;padding:0.5rem 0;">Loading initiatives…</p>
    </div>
    <div id="mc2-initiative-detail" class="team-initiative-detail">
      <p class="team-agent-inbox-empty" style="margin:0;padding:0;">Select an initiative to review and promote.</p>
    </div>
  </div>
</div>
