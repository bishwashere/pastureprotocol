<!-- MC2 view: Agents -->
<div id="mc2-view-agents" class="mc-view" hidden>
  <div class="mc-agents-subapp">
    <div class="mc-agents-subapp-head">
      <div>
        <p class="mc-section-title">AGENTS</p>
        <p class="mc-agents-subapp-hint">Context, Inbox, and Outbox show all agents by default. Click an agent card to filter them.</p>
      </div>
      <label class="mc-agent-filter" for="mc2-agents-agent-filter">
        <span>Agent</span>
        <select id="mc2-agents-agent-filter" class="mc2-agent-filter-select" aria-label="Filter agent workspace by agent">
          <option value="">All agents</option>
        </select>
      </label>
    </div>

    <section id="mc2-agents-panel-overview" class="mc-agents-subpanel">
      <div class="mc-agents-overview" id="mc2-agents-detail">
        <p style="color:var(--muted);font-size:0.66rem;">Loading agents…</p>
      </div>
    </section>

    <section class="mc-agents-workspace" aria-label="Agent workspace">
      <div class="team-agent-panel-ranges mc2-range-controls" aria-label="Agent context timeline">
        <button type="button" class="team-agent-panel-range active" data-range="today" aria-pressed="true">Today</button>
        <button type="button" class="team-agent-panel-range" data-range="yesterday" aria-pressed="false">Yesterday</button>
        <button type="button" class="team-agent-panel-range" data-range="last7" aria-pressed="false">Last week</button>
        <button type="button" class="team-agent-panel-range" data-range="last30" aria-pressed="false">Last 30 days</button>
      </div>

      <div class="mc-agents-workspace-grid">
        <section id="mc2-agents-panel-context" class="mc-agents-workspace-card">
          <div class="mc-agents-workspace-head">
            <p class="mc-section-title" id="mc2-agents-context-title">ACTIVE CONTEXT</p>
          </div>
          <div id="mc2-agents-context-list" class="mc-agents-workspace-feed">
            <p style="color:var(--muted);font-size:0.66rem;">Loading context…</p>
          </div>
        </section>

        <section id="mc2-agents-panel-inbox" class="mc-agents-workspace-card">
          <div class="mc-agents-workspace-head">
            <p class="mc-section-title">INBOX</p>
          </div>
          <div id="mc2-agents-inbox-feed" class="mc-agents-workspace-feed">
            <p style="color:var(--muted);font-size:0.66rem;">No inbox activity yet.</p>
          </div>
        </section>

        <section id="mc2-agents-panel-outbox" class="mc-agents-workspace-card">
          <div class="mc-agents-workspace-head">
            <p class="mc-section-title">OUTBOX</p>
          </div>
          <div id="mc2-agents-outbox-feed" class="mc-agents-workspace-feed">
            <p style="color:var(--muted);font-size:0.66rem;">No outbox activity yet.</p>
          </div>
        </section>
      </div>
    </section>
  </div>
</div>
