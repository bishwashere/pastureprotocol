<div id="page-team2" class="page">
    <div class="card mc-shell">
      <!-- Sidebar -->
      <nav class="mc-sidebar" aria-label="Mission Control navigation">
        <div class="mc-sidebar-logo" aria-hidden="true">♞</div>
        <div class="mc-sidebar-nav">
          <button type="button" class="mc-nav-item active" data-mc-nav="mission" aria-label="Home">
            <span class="mc-nav-icon">⌂</span><span class="mc-nav-label">Home</span>
          </button>
          <button type="button" class="mc-nav-item" data-mc-nav="tasks" aria-label="Tasks">
            <span class="mc-nav-icon">☑</span><span class="mc-nav-label">Tasks</span>
          </button>
          <button type="button" class="mc-nav-item" data-mc-nav="agents" aria-label="Agents">
            <span class="mc-nav-icon">♙</span><span class="mc-nav-label">Agents</span>
          </button>
          <button type="button" class="mc-nav-item" data-mc-nav="context" aria-label="Context">
            <span class="mc-nav-icon">◌</span><span class="mc-nav-label">Context</span>
          </button>
          <button type="button" class="mc-nav-item" data-mc-nav="initiatives" aria-label="Initiatives">
            <span class="mc-nav-icon">ϟ</span><span class="mc-nav-label">Initiatives</span>
          </button>
          <button type="button" class="mc-nav-item" data-mc-nav="projects" aria-label="Projects">
            <span class="mc-nav-icon">◫</span><span class="mc-nav-label">Projects</span>
          </button>
          <button type="button" class="mc-nav-item" data-mc-nav="inbox" aria-label="Inbox">
            <span class="mc-nav-icon">□</span><span class="mc-nav-label">Inbox</span><span class="mc-nav-badge" id="mc2-inbox-badge">3</span>

          <button type="button" class="mc-nav-item" data-mc-nav="outbox" aria-label="Outbox">
            <span class="mc-nav-icon">⇄</span><span class="mc-nav-label">Outbox</span><span class="mc-nav-badge" id="mc2-outbox-badge">2</span>
          </button>
          <button type="button" class="mc-nav-item" data-mc-nav="activity" aria-label="Activity">
            <span class="mc-nav-icon">⌁</span><span class="mc-nav-label">Activity</span>
          </button>
          <button type="button" class="mc-nav-item" data-mc-nav="goals" aria-label="Missions">
            <span class="mc-nav-icon">◎</span><span class="mc-nav-label">Missions</span>
            <span class="mc-nav-badge" id="mc2-approvals-badge" hidden aria-label="Pending approvals">0</span>
          </button>
          <button type="button" class="mc-nav-item" data-mc-nav="stats" aria-label="Reports">
            <span class="mc-nav-icon">▥</span><span class="mc-nav-label">Reports</span>
          </button>
          <div class="mc-sidebar-projects-wrap">
            <div class="mc-sidebar-projects-label">Projects</div>
            <div id="mc2-sidebar-projects" class="mc-sidebar-projects" aria-label="Project shortcuts">

          <div style="margin-top:auto;padding-top:0.5rem;border-top:1px solid var(--border);margin-bottom:0.35rem;"></div>
          <button type="button" class="mc-nav-item" data-mc-nav="agents" aria-label="Settings">
            <span class="mc-nav-icon">⚙</span><span class="mc-nav-label">Settings</span>
          </button>
          <button type="button" class="mc-nav-item" data-mc-nav="back" aria-label="Back to old Team view" title="Back to classic Team view">
            <span class="mc-nav-icon">←</span><span class="mc-nav-label">Classic</span>
          </button>
        </div>
        <div class="mc-sidebar-footer">
          <strong id="mc2-actions-rate">—</strong>
          actions/min
        </div>
      </nav>

      <!-- Main content -->
      <div class="mc-main">
        <!-- Header -->
        <header class="mc-header">
          <h1 class="mc-header-title">Pasture Protocol</h1>
          <span class="mc-header-pulse" aria-hidden="true">〜</span>
          <div class="mc-mission-select-wrap">
            <select id="mc2-mission-select" class="mc-mission-select" aria-label="Active mission">
              <option value="">No active mission</option>
            </select>
          </div>
          <div class="mc-header-actions">
            <span class="mc-live-badge" id="mc2-live-badge">
              <span class="mc-live-dot"></span>Live <span class="mc-mini-pulse" aria-hidden="true">⌁</span>
            </span>
            <button type="button" class="mc-icon-btn" aria-label="Notifications">♢</button>
            <span class="mc-profile-dot" aria-hidden="true">BM</span>
            <button type="button" id="mc2-add-agent-btn" class="chat-toolbar-btn" style="margin:0;" title="Create a new agent">+ Agent</button>
          </div>
        </header>

        <div id="mc2-pending-approvals" class="mc-pending-approvals" hidden aria-live="polite"></div>

        <!-- MC2 page views (loaded from pages/mc2/*.html) -->
        <div id="mc2-views-root">
<!-- MC2_VIEWS -->
        </div>
      </div>
    </div>

    <!-- Task detail drawer (opens from kanban, tasks list, movement, etc.) -->
    <div id="mc2-task-drawer" class="mc-task-drawer" aria-hidden="true">
      <div class="mc-task-drawer-backdrop" data-mc-task-drawer-close tabindex="-1"></div>
      <aside class="mc-task-drawer-panel" role="dialog" aria-modal="true" aria-labelledby="mc2-task-drawer-title">
        <div class="mc-task-drawer-header">
          <p class="mc-task-drawer-kicker">Task</p>
          <button type="button" class="mc-task-drawer-close" data-mc-task-drawer-close aria-label="Close task detail">×</button>
        </div>
        <div id="mc2-task-drawer-body" class="mc-task-drawer-body"></div>
      </aside>
    </div>
  </div>
